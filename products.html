<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRODUCTS | T-WORLD KOREA</title>
  <meta name="description" content="반팔, 나시, 긴팔, 바지 제품 라인업을 확인할 수 있는 기본 의류 도매 카탈로그 페이지입니다.">
  <link rel="stylesheet" href="css/style.css?v=20260511-text-panel">
</head>
<body data-page="products">
  <header class="site-header" data-header>
    <a class="brand" href="index.html" aria-label="홈으로 이동">T-WORLD KOREA</a>
    <button class="nav-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" data-nav-toggle><span></span><span></span></button>
    <nav class="site-nav" data-nav>
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="products.html">PRODUCTS</a>
      <a href="lookbook.html">LOOKBOOK</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </header>

  <main>
    <section class="page-hero compact fade-up">
      <p class="eyebrow">PRODUCT CATALOG</p>
      <h1>PRODUCT LINEUP</h1>
      <p>PDF 카탈로그 기준 반팔, 나시, 긴팔, 맨투맨, 후드, 팬츠 라인업을 확인하세요.</p>
    </section>

    <section class="section product-catalog fade-up">
      <div class="filter-panel" aria-label="제품 필터">
        <div>
          <p class="filter-label">CATEGORY</p>
          <div class="filter-row" data-category-filters>
            <button class="filter-btn is-active" type="button" data-filter="All">전체</button>
            <button class="filter-btn" type="button" data-filter="Short Sleeve">반팔</button>
            <button class="filter-btn" type="button" data-filter="Sleeveless">나시</button>
            <button class="filter-btn" type="button" data-filter="Long Sleeve">긴팔</button>
            <button class="filter-btn" type="button" data-filter="Sweatshirt">맨투맨</button>
            <button class="filter-btn" type="button" data-filter="Hoodie">후드</button>
            <button class="filter-btn" type="button" data-filter="Pants">팬츠</button>
          </div>
        </div>
        <div>
          <p class="filter-label">FIT AND WEIGHT</p>
          <div class="filter-row" data-type-filters>
            <button class="filter-btn is-active" type="button" data-filter="All">All</button>
            <button class="filter-btn" type="button" data-filter="Regular Fit">Regular Fit</button>
            <button class="filter-btn" type="button" data-filter="Relaxed Fit">Relaxed Fit</button>
            <button class="filter-btn" type="button" data-filter="Oversized Fit">Oversized Fit</button>
            <button class="filter-btn" type="button" data-filter="Heavy Weight">Heavy Weight</button>
          </div>
        </div>
      </div>
      <div class="result-count" data-product-count></div>
      <div class="product-grid catalog-grid" data-products-grid></div>
    </section>
  </main>

  <footer class="site-footer">
    <div><strong>T-WORLD KOREA</strong><p>제품별 소재, 중량, 컬러 정보를 확인하세요.</p></div>
    <div><a href="about.html">ABOUT</a><a href="contact.html">CONTACT</a></div>
  </footer>

  <script src="data/products.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
